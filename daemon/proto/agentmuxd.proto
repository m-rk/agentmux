syntax = "proto3";

package agentmuxd.v1;

option go_package = "github.com/m-rk/agentmux/daemon/internal/pb";

service AgentmuxDaemon {
  // Snapshot of every instance the daemon currently knows about.
  rpc ListInstances(ListInstancesRequest) returns (ListInstancesResponse);

  // Pushes an event whenever an instance's status changes, so clients don't
  // need to poll ListInstances.
  rpc StreamEvents(StreamEventsRequest) returns (stream InstanceEvent);

  // Bidirectional PTY stream. The first client message must be an
  // AttachRequest naming the instance; every message after that is stdin
  // bytes or a resize. Server messages are stdout bytes or an error.
  rpc Attach(stream ClientMessage) returns (stream ServerMessage);

  // Start/stop/restart an instance's systemd unit (Linux) or LaunchAgent
  // (macOS).
  rpc Control(ControlRequest) returns (ControlResponse);

  // Provisions a brand new instance on this host: writes its registry
  // entry, installs its unit/LaunchAgent, and starts it.
  rpc CreateInstance(CreateInstanceRequest) returns (CreateInstanceResponse);

  // Lists Claude Code session IDs resumable for a given workdir, for the
  // wizard's resume picker.
  rpc ListResumableSessions(ListResumableSessionsRequest) returns (ListResumableSessionsResponse);

  // Renames an existing instance's tmux session and/or (claude-code only)
  // its Remote Control display name. A tmux session name change is applied
  // live via "tmux rename-session" if the session is currently running — no
  // restart needed. A display name change requires a restart (it's baked
  // into the claude --remote-control argv at launch), issued by the daemon
  // itself, not the caller — see daemonserver's implementation for why that
  // distinction matters for an instance renaming its own hosting session.
  rpc RenameInstance(RenameInstanceRequest) returns (RenameInstanceResponse);
}

enum Status {
  STATUS_UNKNOWN = 0;
  STATUS_RUNNING = 1;  // tmux session active, pane output changed recently
  STATUS_IDLE = 2;     // tmux session active, no pane output for a while
  STATUS_DEAD = 3;     // instance is configured but no tmux session found
}

message Instance {
  string name = 1;
  string agent = 2;
  string provider = 3;
  string model = 4;
  string workdir = 5;
  string tmux_session = 6;
  Status status = 7;
  int64 pid = 8;
  int64 last_activity_unix = 9;
  int64 started_at_unix = 10;  // 0 if the instance has no live tmux session
}

message ListInstancesRequest {}

message ListInstancesResponse {
  repeated Instance instances = 1;
}

message StreamEventsRequest {}

enum EventType {
  EVENT_UNKNOWN = 0;
  EVENT_UPDATED = 1;
  EVENT_REMOVED = 2;
}

message InstanceEvent {
  EventType type = 1;
  Instance instance = 2;
}

message AttachRequest {
  string instance = 1;
}

message Resize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message ClientMessage {
  oneof payload {
    AttachRequest attach = 1;  // must be the first message on the stream
    bytes stdin = 2;
    Resize resize = 3;
  }
}

message ServerMessage {
  oneof payload {
    bytes stdout = 1;
    string error = 2;
  }
}

enum ControlAction {
  CONTROL_UNKNOWN = 0;
  CONTROL_START = 1;
  CONTROL_STOP = 2;
  CONTROL_RESTART = 3;
}

message ControlRequest {
  string instance = 1;
  ControlAction action = 2;
}

message ControlResponse {
  bool ok = 1;
  string message = 2;
}

message CreateInstanceRequest {
  string instance_name = 1;
  string agent = 2;              // "claude-code" | "zero" | "opencode" | "kilo"
  string provider = 3;           // zero/opencode/kilo only
  string model = 4;               // zero/opencode/kilo only
  string workdir = 5;             // empty = provisioner default
  string resume_session_id = 6;   // claude-code only; empty = fresh session
  string run_user = 7;            // Linux only; empty = provisioner default
  // claude-code only. "", "on", or "off" — empty means "use the default"
  // (on). Off skips the nightly compact-then-restart cycle entirely,
  // falling back to the old version-change-only restart behavior.
  string compact_on_update = 8;
}

message CreateInstanceResponse {
  bool ok = 1;
  string message = 2;  // combined log/summary, mirrors ControlResponse
}

message ListResumableSessionsRequest {
  string workdir = 1;
  string run_user = 2;  // Linux only
}

message ResumableSession {
  string session_id = 1;
  int64 last_modified_unix = 2;
}

message ListResumableSessionsResponse {
  repeated ResumableSession sessions = 1;
}

message RenameInstanceRequest {
  string instance = 1;
  string tmux_session_name = 2; // empty = unchanged
  string display_name = 3;      // empty = unchanged; claude-code only
}

message RenameInstanceResponse {
  bool ok = 1;
  string message = 2;
}
